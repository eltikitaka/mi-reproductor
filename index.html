<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nwakalo Live Player</title>
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        #menu-header { background: #111; padding: 10px; border-bottom: 2px solid #cc0000; text-align: center; }
        select { background: #222; color: #fff; padding: 10px; width: 95%; border-radius: 5px; border: 1px solid #444; font-size: 14px; }
        #video-container { flex: 1; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }
        #ticker { height: 45px; background: #000; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-header">
        <select id="lista-eventos" onchange="reproducir(this.value)">
            <option>Cargando eventos de nwakalo...</option>
        </select>
    </div>

    <div id="video-container">
        <video id="player" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div id="ticker">
        <!-- Ticker de resultados -->
        <iframe src="https://scorebat.com" width="100%" height="45" frameborder="0" scrolling="no"></iframe>
    </div>
</div>

<script src="https://zencdn.net"></script>
<script>
    const player = videojs('player');
    // URL de tu JSON en versión "RAW" (importante para que funcione)
    const urlJSON = 'https://githubusercontent.com';

    async function cargarEventos() {
        try {
            const respuesta = await fetch(urlJSON);
            const eventos = await respuesta.json();
            const select = document.getElementById('lista-eventos');
            
            select.innerHTML = '<option value="">⚽ Selecciona un evento disponible...</option>';

            eventos.forEach(evento => {
                let opt = document.createElement('option');
                // Guardamos la URL del canal. Si en tu JSON el campo se llama 'url', lo dejamos así.
                opt.value = evento.url; 
                // Mostramos: "Hora - Nombre del Evento (Canal)"
                opt.innerText = `${evento.hora} - ${evento.evento} (${evento.canal})`;
                select.appendChild(opt);
            });
        } catch (e) {
            console.error("Error leyendo el JSON:", e);
            document.getElementById('lista-eventos').innerHTML = '<option>Error al cargar eventos</option>';
        }
    }

    function reproducir(url) {
        if (url) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }
    }

    cargarEventos();
</script>
</body>
</html>
