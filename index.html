<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nwakalo Player Fix</title>
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        #menu-header { background: #111; padding: 15px; border-bottom: 2px solid #cc0000; text-align: center; }
        select { background: #222; color: #fff; padding: 12px; width: 95%; border-radius: 5px; border: 1px solid #444; font-size: 16px; }
        #video-container { flex: 1; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }
        #ticker { height: 50px; background: #000; border-top: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-header">
        <select id="lista-eventos" onchange="reproducir(this.value)">
            <option>⏳ Cargando eventos...</option>
        </select>
    </div>

    <div id="video-container">
        <video id="player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div id="ticker">
        <iframe src="https://scorebat.com" width="100%" height="50" frameborder="0" scrolling="no"></iframe>
    </div>
</div>

<script src="https://zencdn.net"></script>
<script>
    const player = videojs('player');
    // Usamos un proxy para evitar bloqueos de seguridad (CORS)
    const urlJSON = 'https://allorigins.win' + encodeURIComponent('https://githubusercontent.com');

    async function cargarEventos() {
        const select = document.getElementById('lista-eventos');
        try {
            const respuesta = await fetch(urlJSON);
            const eventos = await respuesta.json();
            
            select.innerHTML = '<option value="">⚽ Selecciona un partido</option>';

            eventos.forEach((ev, index) => {
                // Buscamos la URL o ID sin importar cómo se llame en tu JSON
                const link = ev.url || ev.id || ev.link || ev.stream;
                const nombre = ev.evento || ev.name || ev.titulo || "Evento " + index;
                const hora = ev.hora || "";
                
                if (link) {
                    let opt = document.createElement('option');
                    opt.value = link;
                    opt.innerText = `${hora} - ${nombre}`.trim();
                    select.appendChild(opt);
                }
            });

            if (select.options.length <= 1) {
                select.innerHTML = '<option>⚠️ No se encontraron enlaces en el JSON</option>';
            }

        } catch (e) {
            select.innerHTML = '<option>❌ Error de conexión con nwakalo</option>';
            console.error(e);
        }
    }

    function reproducir(url) {
        if (!url) return;
        // Si el enlace es solo un ID, podrías necesitar completarlo aquí
        const finalUrl = url.startsWith('http') ? url : 'https://TU_://servidor.com' + url + '.m3u8';
        
        player.src({ src: finalUrl, type: 'application/x-mpegURL' });
        player.play().catch(error => {
            alert("El canal no se puede reproducir. Puede que el enlace esté caído.");
        });
    }

    cargarEventos();
</script>
</body>
</html>
