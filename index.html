<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Player</title>
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: Arial; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        #video-container { flex-grow: 1; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* Ticker inferior */
        #ticker {
            height: 45px;
            background: #cc0000;
            color: white;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="video-container">
        <video id="player" class="video-js vjs-big-play-centered" controls preload="auto">
            <!-- Pon aquí uno de tus enlaces de nwakalo para probar -->
            <source src="https://githubusercontent.com" type="application/x-mpegURL">
        </video>
    </div>

    <div id="ticker">
        <iframe src="https://scorebat.com" width="100%" height="45" frameborder="0" scrolling="no"></iframe>
    </div>
</div>

<script src="https://zencdn.net"></script>
</body>
</html>
