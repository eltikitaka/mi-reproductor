<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nwakalo Player</title>
    <link href="https://zencdn.net" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Selector de canales arriba */
        #menu-canales { background: #1a1a1a; padding: 10px; text-align: center; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; width: 80%; max-width: 400px; }

        #video-container { flex: 1; position: relative; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* Barra de resultados abajo */
        #ticker { height: 50px; background: #000; border-top: 1px solid #cc0000; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-canales">
        <select id="lista-canales" onchange="cambiarCanal(this.value)">
            <option value="">Cargando canales de nwakalo...</option>
        </select>
    </div>

    <div id="video-container">
        <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div id="ticker">
        <!-- Ticker de resultados -->
        <iframe src="https://scorebat.com" width="100%" height="50" frameborder="0" scrolling="no"></iframe>
    </div>
</div>

<script src="https://zencdn.net"></script>
<script>
    const player = videojs('player');
    const urlM3U = 'https://githubusercontent.com'; // Asegúrate que el nombre del archivo sea correcto

    async function cargarLista() {
        try {
            const respuesta = await fetch(urlM3U);
            const texto = await respuesta.text();
            const lineas = texto.split('\n');
            const select = document.getElementById('lista-canales');
            select.innerHTML = '<option value="">Selecciona un canal</option>';

            for (let i = 0; i < lineas.length; i++) {
                if (lineas[i].startsWith('#EXTINF')) {
                    const nombre = lineas[i].split(',')[1];
                    const url = lineas[i + 1].trim();
                    let opcion = document.createElement('option');
                    opcion.value = url;
                    opcion.text = nombre;
                    select.appendChild(opcion);
                }
            }
        } catch (e) {
            console.error("Error cargando la lista", e);
        }
    }

    function cambiarCanal(url) {
        if (url) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }
    }

    cargarLista();
</script>
</body>
</html>
